<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollable Sections with Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Fonts */
    .libre-baskerville-regular { font-family: "Libre Baskerville", serif; font-weight: 400; font-style: normal; }
    .libre-baskerville-bold { font-family: "Libre Baskerville", serif; font-weight: 700; font-style: normal; }
    .libre-baskerville-regular-italic { font-family: "Libre Baskerville", serif; font-weight: 400; font-style: italic; }
        }
        body {
            font-family: Arial, sans-serif;
            background-image: url('image8.jpg'); /* Change to your image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: rgb(17, 15, 15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            overflow-y: auto;
            text-align: center;
        }
        .section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            padding: 20px;
        }
        h1 {
            font-size: 1em; /* Makes the title bigger */
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }
        h2 {
            font-size: 0.5em; /* Makes the instructions smaller */
            line-height: 1.6; /* Space between sentences */
            margin-bottom: 20px;
            font-family: Arial, sans-serif;
        }

        /* Last Slide Styling */
        .last-slide {
            width: 100%;
            height: 100vh; /* Full viewport height */
            background-image: url('image8.jpg'); /* Same background image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center; /* Center content vertically and horizontally */
            text-align: center;
            position: relative; /* Ensure positioning for the button */
            font-size: 2em;
        }

         
        .last-slide h1 {
            
            font-size: 1em; /* Makes the title bigger */
            margin-bottom: 20px;
        }
        .last-slide h2{
            
            line-height: 1.6; /* Space between sentences */
            margin-bottom: 20px;
            
        }
        .last-slide .content {
            text-align: center;
        }

        /* Button Styling */
        .back-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid black;
            background-color: #f0f0f0;
            color: rgb(24, 22, 22);
            cursor: pointer;
        }

        .back-button:hover {
            background-color: #87888a;
        }

        /* Adjust for small screens */
        @media (max-width: 600px) {
            .back-button {
                font-size: 14px;
                padding: 8px 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="section">
        <h1>MEMOTIONS</h1>
        <h2>
            A participatory animated film with cherished objects <br>
       Created by Nairy Eivazy <br>
            2025   <br>
         Prototype version — ongoing development <br>
            
        </h2>
    </div>
    
</body>
</html>
