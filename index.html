<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memotions Interactive Prototype</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    :root {
      --background-color: #e7d583;
    }

    body, html {
      margin: 0;
      padding: 0;
      font-family: "Libre Baskerville", serif;
      height: 100%;
      overflow: hidden;
    }

    /* Full-screen video container */
    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
      background-color: var(--background-color);
    }

    video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* Text box */
    .text-section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 700px;
      padding: 25px 40px;
      background: rgba(230, 192, 69, 0.85);
      border-radius: 45px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      font-size: 1.6em;
      text-align: center;
      color: #000000;
      z-index: 2;
      opacity: 0;
      transition: opacity 1s;
    }

    /* Interactive tap prompt */
    .tap-object {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(241, 42, 42, 0.8);
      padding: 20px 35px;
      border-radius: 20px;
      font-size: 1.5em;
      color: #000;
      cursor: pointer;
      z-index: 2;
      user-select: none;
    }

    /* Start screen overlay */
    #start-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgb(236, 198, 94);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #start-btn {
      padding: 30px 60px;
      font-size: 2em;
      border-radius: 15px;
      border: none;
      background-color: rgba(253, 66, 9, 0.8);
      color: #000000;
      cursor: pointer;
    }

    /* Last slide */
    .last-slide {
      position: relative;
      height: 100vh;
      background-color: var(--background-color);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .last-slide button {
      z-index: 2;
      padding: 25px 50px;
      font-size: 1.5em;
      border-radius: 12px;
      border: none;
      background-color: rgba(223,17,17,0.8);
      cursor: pointer;
      color: #000;
    }
  </style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <button id="start-btn">Welcome</button>
</div>

<!-- Main Video + Text -->
<div class="video-container">
  <video id="background-video" muted loop playsinline preload="auto">
    <source src="video1.mp4" type="video/mp4">
  </video>

  <div id="text-box" class="text-section"></div>s

  <div id="tap-object" class="tap-object">Tap</div>
</div>

<!-- Last Slide -->
<div class="last-slide" style="display:none;">
 
    <button onclick="window.location.href='i.html'">Start Animating</button>
  </div>
</div>

<script>
  const startScreen = document.getElementById('start-screen');
  const startBtn = document.getElementById('start-btn');
  const video = document.getElementById('background-video');
  const textBox = document.getElementById('text-box');
  const tapObject = document.getElementById('tap-object');
  const lastSlide = document.querySelector('.last-slide');

  // Text messages for transition
  const texts = [
    "Animation comes from a Latin word that means 'to give life.'",
    "It’s a way of bringing objects to life and making them move.",
    "If your object could move, where would it go?",
    "Just think about it.",
    "How would it move?",
    "If it could talk, what would it say to you?",
    "Place your object on the stand and start animating",
    
  ];

  let currentIndex = 0;

  // Show text
  function showNextText() {
    if(currentIndex < texts.length){
      textBox.style.opacity = 0;
      setTimeout(() => {
        textBox.textContent = texts[currentIndex];
        textBox.style.opacity = 1;
        currentIndex++;
      }, 500);
    } else {
      // Hide main container and show last slide
      document.querySelector('.video-container').style.display = 'none';
      lastSlide.style.display = 'flex';
    }
  }

  // Start the experience
  startBtn.addEventListener('click', () => {
    startScreen.style.display = 'none';
    video.play().catch(() => {});
    showNextText();
  });

  // Tap to advance text
  tapObject.addEventListener('click', showNextText);
</script>

</body>
</html>
