<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Story</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    :root {
      --background-color: #e7d583;
    }

    body, html {
      margin: 0;
      padding: 0;
      font-family: "Libre Baskerville", serif;
      overflow: hidden;
    }

    /* SINGLE SLIDE */
    .parallax {
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: var(--background-color);
    }

    .parallax video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* BIGGER TEXT BOX */
    .text-section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 700px;
      padding: 30px 40px;
      background: rgba(238, 206, 64, 0.85);
      border-radius: 45px;
      font-size: 2em; /* 🔥 BIGGER TEXT */
      text-align: center;
      color: rgb(2, 2, 2);
      z-index: 2;
      opacity: 1;
      transition: opacity 1s ease;
    }

    .fade-out {
      opacity: 0;
    }

    /* BUTTON */
    .end-button {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: none;
    }

    .end-button button {
      padding: 20px 40px;
      font-size: 1.2em;
      border-radius: 10px;
      border: none;
      background-color: rgba(223, 17, 17, 0.7);
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="parallax">

  <!-- ONE VIDEO ONLY -->
  <video autoplay muted loop playsinline>
    <source src="video5.mp4" type="video/mp4">
  </video>

  <!-- TEXT -->
  <div class="text-section" id="textBox">
    Our objects keep our memories
  </div>

  <!-- FINAL BUTTON -->
  <div class="end-button" id="endButton">
    <a href="m.html">
      <button>Thanks for participating</button>
    </a>
  </div>

</div>

<script>
  const texts = [
    "Our objects keep our memories",
    "They hold the stories we cherish",
    "Or the ones we do not remember",
    "Why do they carry these tales?",
    "Whose stories will remain?",
    "Whose stories will be forgotten?"
  ];

  let index = 0;
  const textBox = document.getElementById("textBox");
  const endButton = document.getElementById("endButton");

  function changeText() {
    textBox.classList.add("fade-out");

    setTimeout(() => {
      index++;

      if (index < texts.length) {
        textBox.textContent = texts[index];
        textBox.classList.remove("fade-out");
      } else {
        textBox.style.display = "none";
        endButton.style.display = "block";
      }
    }, 1000);
  }

  // Change text every 3 seconds
  setInterval(changeText, 3000);
</script>

</body>
</html>
