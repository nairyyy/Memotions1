<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <title>Parallax Scrolling with Video Background</title>
  <style>
    /* ===== Customize your fallback background color here ===== */
    :root {
      --background-color: #e7d583; /* fallback color if video fails */
    }

    /* Fonts */
    .libre-baskerville-regular { font-family: "Libre Baskerville", serif; font-weight: 400; font-style: normal; }
    .libre-baskerville-bold { font-family: "Libre Baskerville", serif; font-weight: 700; font-style: normal; }
    .libre-baskerville-regular-italic { font-family: "Libre Baskerville", serif; font-weight: 400; font-style: italic; }

    body, html {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      font-family: "Libre Baskerville", serif;
      font-weight: 400;
    }

    /* Parallax container with video background */
    .parallax {
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: var(--background-color); /* fallback color */
    }

    .parallax video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* Text sections centered on screen */
    .text-section {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 600px;
      padding: 20px 30px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 45px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      font-size: 1.2em;
      text-align: center;
      color: rgb(255, 255, 255);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
    }

    /* Floating PNG images */
    .floating-image {
      position: absolute;
      height: 50vh;
      width: auto;
      animation: float 2s infinite alternate ease-in-out;
      z-index: 1;
    }

    /* Unique positions for each PNG */
    .png1 { top: 75%; left: 10%; }   
    .png2 { top: 5%; right: 5%; }    
    .png3 { top: 75%; left: 10%; } 
    .png4 { top: 70%; right: 10%; }     
    .png5 { top: 5%; right: 5%; }

    /* Responsive adjustments for floating PNGs */
    @media (max-width: 600px) { .floating-image { height: 35vh; } }
    @media (min-width: 601px) and (max-width: 1024px) { .floating-image { height: 45vh; } }

    /* Float animation */
    @keyframes float {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-20px); }
    }

    /* Last slide styling */
    .last-slide {
      height: 100vh;
      background-color: var(--background-color); /* fallback */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .last-slide video {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .last-slide .content h1 { font-size: 1.2em; }
    .last-slide .content a button {
      margin: 10px;
      padding: 20px 40px;
      font-size: 1.2em;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background-color: rgba(223, 17, 17, 0.7);
      color: rgb(0, 0, 0);
    }
  </style>
</head>
<body>

  <!-- Slide 1 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>
    <img src="png1.png" class="floating-image png1" alt="Floating PNG">
    <div class="text-section">Our objects keep our memories</div>
  </div>

  <!-- Slide 2 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video3.mp4" type="video/mp4">
    </video>
    <div class="text-section">They hold the stories we cherish</div>
  </div>

  <!-- Slide 3 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video4.mp4" type="video/mp4">
    </video>
    <div class="text-section">Or the ones we do not remember</div>
  </div>

  

  <!-- Slide 5 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>
    <div class="text-section">Why do they carry these tales?</div>
  </div>



   <!-- Slide 5 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video3.mp4" type="video/mp4">
    </video>
    <div class="text-section">Whose stories will remain?</div>
  </div>

     <!-- Slide 5 -->
  <div class="parallax">
    <video autoplay muted loop playsinline>
      <source src="video1.mp4" type="video/mp4">
    </video>
    <div class="text-section">Whose stories will be forgotten?</div>
  </div>



  <!-- Last Slide -->
  <div class="last-slide">
    <video autoplay muted loop playsinline>
      <source src="videoLast.mp4" type="video/mp4">
    </video>
    <div class="content">
      <a href="i.html">
        <button>Thanks for participating</button>
      </a>
    </div>
  </div>

</body>
</html>
