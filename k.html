<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop-Motion Animation - Your Object Speaks</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: "Libre Baskerville", serif; background-color: #000; color: #fff; height: 100vh; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; }

    canvas { width: 100%; height: 100%; object-fit: cover; }

    /* Overlay text box */
    .text-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 25px 40px;
      border-radius: 40px;
      font-size: 2em;
      text-align: center;
      z-index: 2;
    }

    /* Go Forward Button */
    .go-forward {
      position: absolute;
      bottom: 5%;
      right: 5%;
      padding: 15px 35px;
      font-size: 1.5em;
      border-radius: 12px;
      border: none;
      background-color: #e72a2a;
      color: #fff;
      cursor: pointer;
      z-index: 2;
    }

    .go-forward:hover { background-color: #b22222; }

    /* Back button for mobile testing */
    .back-button {
      position: absolute;
      bottom: 5%;
      left: 5%;
      padding: 15px 35px;
      font-size: 1.5em;
      border-radius: 12px;
      border: none;
      background-color: #f0e770;
      color: #000;
      cursor: pointer;
      z-index: 2;
    }

    .back-button:hover { background-color: #d4d44f; }

    @media (max-width:600px) {
      .text-overlay { font-size: 1.5em; padding: 20px 30px; }
      .go-forward, .back-button { font-size: 1.2em; padding: 12px 25px; }
    }
  </style>
</head>
<body>

  <canvas id="animationCanvas"></canvas>

  <div class="text-overlay">What does your object say?</div>

  <button class="go-forward" id="nextBtn">Go Forward</button>
  <button class="back-button" onclick="window.history.back();">Try Again</button>

  <script>
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    const nextBtn = document.getElementById('nextBtn');

    // Get frames from localStorage (same as j page)
    const frames = JSON.parse(localStorage.getItem('stopMotionFrames')) || [];

    if(frames.length === 0){
      alert('No frames found! Returning to camera page.');
      window.location.href = 'i.html';
    }

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let index = 0;
    const speed = 100; // ms per frame

    function playAnimation(){
      if(frames.length === 0) return;
      const img = new Image();
      img.src = frames[index];
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };
      index = (index + 1) % frames.length;
    }

    setInterval(playAnimation, speed);

    // Go Forward button
    nextBtn.addEventListener('click', () => {
      window.location.href = 'c.html';
    });
  </script>

</body>
</html>
